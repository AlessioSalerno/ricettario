<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Il Mio Ricettario</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <header>
    <h1>📖 Il Mio Ricettario</h1>
  </header>

  <main class="container">
    <!-- Form Creazione / Modifica -->
    <section class="form-section">
      <h2 id="form-title">Aggiungi una Ricetta</h2>
      <form id="recipe-form">
        <input type="hidden" id="edit-index" value="-1">

        <div class="form-group">
          <label for="title">Nome della Ricetta</label>
          <input type="text" id="title" placeholder="Es. Torta di Mele" required>
        </div>

        <div class="form-group">
          <label for="ingredients">Ingredienti (uno per riga)</label>
          <textarea id="ingredients" rows="4" placeholder="Es. 300g Farina&#10;3 Mele&#10;100g Zucchero" required></textarea>
        </div>

        <div class="form-group">
          <label for="instructions">Procedimento</label>
          <textarea id="instructions" rows="5" placeholder="Descrivi i passaggi della preparazione..." required></textarea>
        </div>

        <div class="form-group">
          <label for="media-input">Foto o Video del piatto</label>
          <input type="file" id="media-input" accept="image/*,video/*">
        </div>

        <button type="submit" id="submit-btn" class="btn">Salva Ricetta</button>
        <button type="button" id="cancel-edit-btn" class="btn btn-secondary" style="display: none; margin-top: 0.5rem;">Annulla Modifica</button>
      </form>
    </section>

    <!-- Archivio Ricette e Ricerca -->
    <section class="list-section">
      <h2>Le Tue Ricette</h2>
      
      <div class="search-box">
        <input type="text" id="search-input" placeholder="🔍 Cerca per titolo o ingrediente...">
      </div>

      <div id="recipes-container" class="recipes-grid">
        <!-- Schede ricette -->
      </div>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
